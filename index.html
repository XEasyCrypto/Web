<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XEasyCrypto Pro | Vibrant UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;800;900&display=swap');
        
        :root {
            --bg-base: #060608;
            --aura-1: #1e40af; 
            --aura-2: #6b21a8;
            --aura-3: #1e3a8a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --tab-active: rgba(255, 255, 255, 0.12);
            --switcher-bg: rgba(255, 255, 255, 0.05);
            --glow-green: rgba(34, 197, 94, 0.2);
            --glow-red: rgba(239, 68, 68, 0.2);
        }

        body.light-mode {
            --bg-base: #f1f6fa;
            --aura-1: #bae6fd; 
            --aura-2: #f0e6ff; 
            --aura-3: #ffdce5; 
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.6);
            --text-main: #0f172a;
            --tab-active: rgba(0, 0, 0, 0.06);
            --switcher-bg: rgba(0, 0, 0, 0.04);
            --glow-green: rgba(34, 197, 94, 0.12);
            --glow-red: rgba(239, 68, 68, 0.12);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .aura-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .aura {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5; 
            animation: moveAura 15s infinite alternate ease-in-out;
            transition: background 0.8s ease;
            will-change: transform;
        }

        .aura-1 { width: 400px; height: 400px; background: var(--aura-1); top: -5%; left: -5%; }
        .aura-2 { width: 500px; height: 500px; background: var(--aura-2); bottom: -5%; right: -5%; animation-delay: -4s; }
        .aura-3 { width: 300px; height: 300px; background: var(--aura-3); top: 35%; left: 25%; opacity: 0.3; }

        @keyframes moveAura {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            margin: -20px -20px 20px -20px;
            padding: 24px 20px 18px 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 0 0 30px 30px;
        }

        .header-line {
            position: absolute;
            bottom: 0; left: 5%; width: 90%; height: 2px;
            background: linear-gradient(90deg, transparent, #0088cc, #a855f7, transparent);
            opacity: 0;
            filter: blur(0.5px);
            transition: opacity 0.4s ease;
        }

        #price-list {
            transition: opacity 0.22s ease, transform 0.22s ease;
        }
        .tab-changing {
            opacity: 0;
            transform: translateY(8px);
        }

        /* 💎 کارت‌های شیشه‌ای با انعکاس نور (Glassmorphism Highlight) */
        .price-card, .skeleton-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 24px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 24px rgba(0,0,0,0.01);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
        }

        .price-card {
            cursor: pointer;
            opacity: 0;
            transform: translateY(15px);
            /* لبه‌ی براق شیشه‌ای در لایه بالایی کارت */
            background-image: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 40%);
        }
        body.light-mode .price-card {
            background-image: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, transparent 40%);
        }

        .price-card:hover {
            border-color: #0088cc;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 136, 204, 0.12);
        }

        .price-card:active {
            transform: scale(0.98) !important;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-card {
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes glowGreenPulse {
            0% { box-shadow: 0 0 0px var(--glow-green); border-color: var(--card-border); }
            30% { box-shadow: 0 0 16px var(--glow-green); border-color: #22c55e; }
            100% { box-shadow: 0 4px 24px rgba(0,0,0,0.01); border-color: var(--card-border); }
        }
        @keyframes glowRedPulse {
            0% { box-shadow: 0 0 0px var(--glow-red); border-color: var(--card-border); }
            30% { box-shadow: 0 0 16px var(--glow-red); border-color: #ef4444; }
            100% { box-shadow: 0 4px 24px rgba(0,0,0,0.01); border-color: var(--card-border); }
        }
        .glow-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards, glowGreenPulse 1.2s ease-out; }
        .glow-down { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards, glowRedPulse 1.2s ease-out; }

        .theme-toggle-pill {
            position: relative;
            display: flex;
            width: 76px;
            height: 38px;
            background: var(--switcher-bg);
            border: 1px solid var(--card-border);
            border-radius: 99px;
            cursor: pointer;
            padding: 3px;
            transition: all 0.3s ease;
        }
        .theme-toggle-pill .slider {
            position: absolute;
            top: 3px; right: 3px; 
            width: 30px;
            height: 30px;
            background: #0088cc;
            border-radius: 99px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 12px rgba(0, 136, 204, 0.3);
            z-index: 1;
        }
        body.light-mode .theme-toggle-pill .slider {
            transform: translateX(-36px);
        }
        .theme-pill-icon {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
        }

        /* 🌊 لودینگ اسکلتونِ گرادینتیِ نرم و روان جدید */
        .skeleton-pulse {
            background: linear-gradient(90deg, rgba(255,255,255,0.01) 30%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.01) 70%);
            background-size: 200% 100%;
            animation: loadingPulse 1.8s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.light-mode .skeleton-pulse {
            background: linear-gradient(90deg, rgba(0,0,0,0.01) 30%, rgba(0,0,0,0.04) 50%, rgba(0,0,0,0.01) 70%);
            background-size: 200% 100%;
        }

        @keyframes loadingPulse {
            0% { background-position: 150% 0; }
            100% { background-position: -150% 0; }
        }

        .nav-dock {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border-radius: 35px;
            padding: 10px;
            border: 1px solid var(--card-border);
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            z-index: 100;
        }

        .switch-btn {
            flex: 1; padding: 10px; border-radius: 22px; font-size: 12px;
            text-align: center; color: var(--text-main); opacity: 0.5;
            transition: 0.3s; cursor: pointer;
        }

        .switch-btn.active {
            background: #0088cc; color: #ffffff; opacity: 1; font-weight: 800;
        }

        .tab-item {
            flex: 1; padding: 12px; text-align: center; font-size: 13px;
            color: var(--text-main); opacity: 0.5; border-radius: 22px;
            transition: 0.3s; cursor: pointer;
        }

        .tab-item.active {
            background: var(--tab-active); opacity: 1; font-weight: bold;
            border: 1px solid var(--card-border);
        }
    </style>
</head>
<body>

    <svg width="0" height="0" class="absolute">
        <defs>
            <linearGradient id="grad-green" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#22c55e" stop-opacity="0.22"/>
                <stop offset="100%" stop-color="#22c55e" stop-opacity="0.0"/>
            </linearGradient>
            <linearGradient id="grad-red" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ef4444" stop-opacity="0.22"/>
                <stop offset="100%" stop-color="#ef4444" stop-opacity="0.0"/>
            </linearGradient>
            <linearGradient id="grad-gray" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.22"/>
                <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.0"/>
            </linearGradient>
        </defs>
    </svg>

    <div class="aura-layer">
        <div class="aura aura-1"></div>
        <div class="aura aura-2"></div>
        <div class="aura aura-3"></div>
    </div>

    <div class="app-container">
        <header id="main-header">
            <div class="header-line" id="header-line"></div>
            
            <div class="flex justify-between items-center px-2">
                <div>
                    <div id="live-time" class="text-3xl font-[900] tracking-tighter">00:00</div>
                    <div class="text-[11px] opacity-60 font-medium mt-1" id="date-container">
                        <span id="live-date-fa" class="font-bold">--</span>
                        <span class="mx-1 opacity-30">|</span>
                        <span id="live-date-en" class="opacity-80 text-[10px] tracking-wide uppercase font-sans">--</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <a href="https://t.me/XEasyCrypto_Bot" target="_blank" class="flex items-center gap-2 bg-[#0088cc] hover:bg-[#0077b3] text-white px-4 py-2 rounded-2xl shadow-md transition-all active:scale-95 text-[13px] font-bold">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L2 8.5L9.5 12.5M22 2L15.5 22L9.5 12.5M22 2L9.5 12.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        ربات تلگرام
                    </a>
                    
                    <div class="theme-toggle-pill" onclick="toggleTheme()">
                        <div class="slider"></div>
                        <div class="theme-pill-icon text-white" id="pill-dark">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        </div>
                        <div class="theme-pill-icon text-slate-400" id="pill-light">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.22" x2="5.64" y2="17.76"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div id="price-list" class="pb-44"></div>

        <div class="nav-dock" id="bottom-nav">
            <div id="currency-switcher" class="flex bg-[var(--switcher-bg)] rounded-[25px] p-1 mb-2 border border-[var(--card-border)] hidden" dir="ltr">
                <div onclick="setCurrency('Dollar')" id="curr-Dollar" class="switch-btn">Dollar</div>
                <div onclick="setCurrency('Toman')" id="curr-Toman" class="switch-btn active">Toman</div>
            </div>
            <div class="flex gap-1">
                <div onclick="switchTab('fiat')" id="tab-fiat" class="tab-item active">ارزها</div>
                <div onclick="switchTab('gold')" id="tab-gold" class="tab-item">طلا و سکه</div>
                <div onclick="switchTab('crypto')" id="tab-crypto" class="tab-item">دیجیتال</div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'fiat';
        let currentCurrency = 'Toman';

        const data = {
            fiat: [
                { name: 'دلار آمریکا', symbol: 'USD', price: '64,250', change: '+0.4%', sparkline: [10, 15, 8, 12, 18, 14, 22], img: 'https://flagcdn.com/w160/us.png' },
                { name: 'یورو', symbol: 'EUR', price: '69,120', change: '-0.2%', sparkline: [20, 18, 19, 15, 16, 12, 10], img: 'https://flagcdn.com/w160/eu.png' },
                { name: 'پوند انگلیس', symbol: 'GBP', price: '82,400', change: '+0.8%', sparkline: [5, 10, 12, 8, 15, 20, 25], img: 'https://flagcdn.com/w160/gb.png' },
                { name: 'درهم امارات', symbol: 'AED', price: '17,510', change: '0.0%', sparkline: [15, 15, 15, 15, 15, 15, 15], img: 'https://flagcdn.com/w160/ae.png' },
                { name: 'لیر ترکیه', symbol: 'TRY', price: '1,960', change: '-1.5%', sparkline: [25, 22, 18, 19, 14, 10, 5], img: 'https://flagcdn.com/w160/tr.png' },
                { name: 'روبل روسیه', symbol: 'RUB', price: '705', change: '+0.1%', sparkline: [12, 11, 13, 12, 14, 13, 15], img: 'https://flagcdn.com/w160/ru.png' }
            ],
            gold: [
                { name: 'طلا ۱۸ عیار', symbol: 'G18', price: '3,650,000', change: '+1.1%', sparkline: [10, 14, 12, 18, 16, 22, 26], img: 'https://placehold.co/100/eab308/ffffff?text=Gold' },
                { name: 'طلا ۲۴ عیار', symbol: 'G24', price: '4,866,000', change: '+1.1%', sparkline: [10, 14, 12, 18, 16, 22, 26], img: 'https://placehold.co/100/eab308/ffffff?text=Gold' },
                { name: 'سکه امامی', symbol: 'SEKEE', price: '43,100,000', change: '-0.5%', sparkline: [30, 28, 29, 25, 26, 22, 20], img: 'https://placehold.co/100/eab308/ffffff?text=Coin' }
            ],
            crypto: [
                { name: 'Bitcoin', symbol: 'BTC', price: '64,520', toman: '4,145,000,000', change: '+1.2%', sparkline: [12, 15, 14, 18, 17, 22, 24], img: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
                { name: 'Tether', symbol: 'USDT', price: '1.00', toman: '64,250', change: '0.0%', sparkline: [15, 15, 15, 15, 15, 15, 15], img: 'https://cryptologos.cc/logos/tether-usdt-logo.png' },
                { name: 'Toncoin', symbol: 'TON', price: '7.21', toman: '463,000', change: '+4.5%', sparkline: [5, 12, 8, 15, 22, 19, 28], img: 'https://cryptologos.cc/logos/toncoin-ton-logo.png' },
                { name: 'Ethereum', symbol: 'ETH', price: '3,450', toman: '221,600,000', change: '+2.1%', sparkline: [15, 14, 18, 16, 22, 20, 25], img: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' }
            ]
        };

        function renderSkeleton() {
            const list = document.getElementById('price-list');
            list.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const skel = document.createElement('div');
                skel.className = 'skeleton-card';
                skel.innerHTML = `
                    <div class="flex items-center w-1/2">
                        <div class="w-12 h-12 rounded-full skeleton-pulse ml-4 border border-[var(--card-border)]"></div>
                        <div class="flex-1 space-y-2">
                            <div class="h-4 skeleton-pulse rounded w-3/4"></div>
                            <div class="h-3 skeleton-pulse rounded w-1/2"></div>
                        </div>
                    </div>
                    <div class="w-1/4 h-6 skeleton-pulse rounded"></div>
                `;
                list.appendChild(skel);
            }
        }

        function getSvgPaths(arr) {
            const width = 70;
            const height = 26;
            const max = Math.max(...arr);
            const min = Math.min(...arr);
            const range = max - min === 0 ? 1 : max - min;
            
            const points = arr.map((val, index) => {
                const x = (index / (arr.length - 1)) * width;
                const y = height - ((val - min) / range) * height;
                return {x, y};
            });

            const linePath = points.map((p, i) => `${i===0?'M':'L'} ${p.x} ${p.y}`).join(' ');
            const areaPath = `${linePath} L ${width} ${height} L 0 ${height} Z`;

            return { linePath, areaPath };
        }

        function render() {
            const list = document.getElementById('price-list');
            list.classList.remove('tab-changing'); 
            list.innerHTML = '';
            const switcher = document.getElementById('currency-switcher');
            
            if(currentTab === 'crypto') switcher.classList.remove('hidden');
            else switcher.classList.add('hidden');

            data[currentTab].forEach((item, index) => {
                const card = document.createElement('div');
                
                const isNeg = item.change?.includes('-');
                const isZero = item.change === '0.0%';
                
                let glowClass = 'glow-up';
                let strokeColor = '#22c55e';
                let gradId = 'url(#grad-green)';
                
                if (isNeg) { glowClass = 'glow-down'; strokeColor = '#ef4444'; gradId = 'url(#grad-red)'; }
                if (isZero) { glowClass = 'animate-card'; strokeColor = '#94a3b8'; gradId = 'url(#grad-gray)'; }

                card.className = `price-card ${glowClass}`;
                card.style.animationDelay = `${index * 0.03}s`;

                let displayPrice = item.price;
                let unit = 'تومان';

                if (currentTab === 'crypto') {
                    if (currentCurrency === 'Toman') { displayPrice = item.toman; unit = 'تومان'; }
                    else { displayPrice = item.price; unit = 'USD'; }
                }

                const paths = getSvgPaths(item.sparkline || [10,10,10]);
                const sparklineHtml = `
                    <div class="w-[70px] h-[26px] mx-1 opacity-85">
                        <svg width="100%" height="100%" viewBox="0 0 70 26">
                            <path fill="${gradId}" d="${paths.areaPath}" />
                            <path fill="none" stroke="${strokeColor}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="${paths.linePath}" />
                        </svg>
                    </div>
                `;

                card.innerHTML = `
                    <div class="flex items-center max-w-[55%]">
                        <div class="w-11 h-11 min-w-[44px] rounded-full bg-[rgba(128,128,128,0.06)] flex items-center justify-center ml-3 border border-[var(--card-border)] overflow-hidden">
                            <img src="${item.img}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100'">
                        </div>
                        <div class="truncate">
                            <div class="text-[14px] font-bold tracking-tight truncate">${item.name}</div>
                            <div class="text-[10px] opacity-40 uppercase font-black tracking-widest">${item.symbol}</div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        ${sparklineHtml}
                        <div class="text-left" dir="ltr">
                            ${item.change ? `<div class="text-[11px] font-black ${isZero ? 'text-slate-400' : (isNeg ? 'text-red-500' : 'text-green-600')}">${item.change}</div>` : ''}
                            <div class="flex items-baseline justify-end gap-0.5">
                                <span class="text-[16px] font-black tracking-tight">${displayPrice}</span>
                                <span class="text-[9px] opacity-40 font-normal">${unit}</span>
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function updateDateTime() {
            const now = new Date();
            
            // ساعت و دقیقه
            document.getElementById('live-time').innerText = now.toLocaleTimeString('fa-IR', {hour: '2-digit', minute: '2-digit', hour12: false});
            
            // تاریخ شمسی
            document.getElementById('live-date-fa').innerText = now.toLocaleDateString('fa-IR', { weekday: 'long', day: 'numeric', month: 'long' });
            
            // تاریخ میلادی مینی‌مال
            document.getElementById('live-date-en').innerText = now.toLocaleDateString('en-US', { day: '2-digit', month: 'short' });
        }
        setInterval(updateDateTime, 1000); updateDateTime();

        function updatePillColors(isLight) {
            const pillDark = document.getElementById('pill-dark');
            const pillLight = document.getElementById('pill-light');
            if (isLight) {
                pillLight.classList.remove('text-slate-400');
                pillLight.classList.add('text-white');
                pillDark.classList.remove('text-white');
                pillDark.classList.add('text-slate-400');
            } else {
                pillDark.classList.remove('text-slate-400');
                pillDark.classList.add('text-white');
                pillLight.classList.remove('text-white');
                pillLight.classList.add('text-slate-400');
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updatePillColors(isLight);
            render(); 
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            const list = document.getElementById('price-list');
            list.classList.add('tab-changing'); 
            
            setTimeout(() => {
                renderSkeleton();
                setTimeout(render, 250); 
            }, 120);
        }

        function setCurrency(curr) {
            currentCurrency = curr;
            document.querySelectorAll('.switch-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('curr-' + curr).classList.add('active');
            render();
        }

        window.onscroll = function() {
            const header = document.getElementById('main-header');
            const line = document.getElementById('header-line');
            if (header) {
                if (window.scrollY > 20) {
                    header.style.background = 'var(--card-bg)';
                    header.style.backdropFilter = 'blur(25px) saturate(180%)';
                    if (line) line.style.opacity = '1';
                } else {
                    header.style.background = 'transparent';
                    header.style.backdropFilter = 'none';
                    if (line) line.style.opacity = '0';
                }
            }
        };

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            updatePillColors(true);
        } else {
            updatePillColors(false);
        }

        renderSkeleton();
        setTimeout(render, 400);
    </script>
</body>
</html>
